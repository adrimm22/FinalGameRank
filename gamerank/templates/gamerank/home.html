<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>GameRank · Home</title>
  </head>
  <body>
    <h1>GameRank</h1>
    <h2>Games</h2>
    <ul>
      {% for game in games %}
        <li>
          <a href="{% url 'game_detail' game.game_id %}">{{ game.title }}</a>
          <small>({{ game.platform }})</small>
        </li>
      {% empty %}
        <li>No games yet.</li>
      {% endfor %}
    </ul>
  </body>
  </html>
